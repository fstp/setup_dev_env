# vi: ft=yaml.ansible
---
- name: "Set up development environment"
  hosts: "*"
  vars:
    home: "{{ ansible_env.HOME }}"
    bin_dir: "{{ home }}/bin"
  vars_prompt:
    - name: install_neovim
      prompt: "Build and install latest Neovim from source? (yes/no)"
      default: "yes"
      private: false
  pre_tasks:
    - name: "Update apt cache if needed"
      become: true
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600
  tasks:
    - name: "Create user bin directory"
      ansible.builtin.file:
        path: "{{ bin_dir }}"
        state: directory
        mode: "0755"

    - name: "Create user .config directory"
      ansible.builtin.file:
        path: "{{ home }}/.config"
        state: directory
        mode: "0755"

    - name: "Softlink the Ansible bashrc file into home"
      ansible.builtin.file:
        src: "{{ playbook_dir }}/.bashrc.ansible"
        dest: "{{ home }}/.bashrc.ansible"
        state: link
        access_time: preserve
        modification_time: preserve

    - name: "Softlink the decolor utility script into bin"
      ansible.builtin.file:
        src: "{{ playbook_dir }}/decolor"
        dest: "{{ home }}/bin/decolor"
        state: link
        access_time: preserve
        modification_time: preserve

    - name: "Add Ansible to the regular bashrc file"
      ansible.builtin.lineinfile:
        path: "{{ home }}/.bashrc"
        insertbefore: "EOF"
        line: source ~/.bashrc.ansible

    - name: "Create the local bashrc file, not version controlled and custom for this machine"
      ansible.builtin.copy:
        dest: "{{ home }}/.bashrc.local"
        content: |
          #!/usr/bin/bash
          # vi:set ft=sh
        mode: "0644"
        force: false

    - name: Determine correct wxWidgets package based on Ubuntu release
      ansible.builtin.set_fact:
        wx_pkg: >-
          {{
            'libwxgtk3.2-dev'
            if (
              (ansible_distribution == 'Ubuntu' and ansible_distribution_version is version('24.04', '>='))
              or
              (ansible_distribution == 'Linux Mint' and ansible_distribution_version is version('22', '>='))
            )
            else 'libwxgtk3.0-gtk3-dev'
          }}

    - name: Install ASDF (and general system) dependencies
      become: true
      ansible.builtin.apt:
        pkg:
          - unzip
          - build-essential
          - autoconf
          - m4
          - libncurses5-dev
          - libgl1-mesa-dev
          - libglu1-mesa-dev
          - libpng-dev
          - libssh-dev
          - unixodbc-dev
          - net-tools
          - git
          - curl
          - "{{ wx_pkg }}"
          - clang
          - libclang-dev

    - name: "Download ASDF release"
      ansible.builtin.get_url:
        url: https://github.com/asdf-vm/asdf/releases/download/v0.16.7/asdf-v0.16.7-linux-amd64.tar.gz
        dest: "{{ home }}/asdf.tar.gz"
        mode: "0644"

    - name: "Extract ASDF release"
      ansible.builtin.unarchive:
        src: "{{ home }}/asdf.tar.gz"
        dest: "{{ bin_dir }}"
        remote_src: true

    - name: "Regenerate ASDF shims"
      ansible.builtin.shell: |
        . ~/.bashrc
        asdf reshim
      args:
        executable: /usr/bin/bash
      changed_when: true

    - name: "Install the Python package manager called UV"
      ansible.builtin.shell: |
        . ~/.bashrc
        asdf plugin add uv
        asdf install uv latest
        asdf set --home uv latest
      args:
        executable: /usr/bin/bash
        creates: "{{ home }}/.asdf/shims/uv"

    - name: "Install llm (Gemini), ttok and strip-tags, https://simonwillison.net/2023/May/18/cli-tools-for-llms/"
      ansible.builtin.shell: |
        . ~/.bashrc
        uv tool install llm --with llm-gemini
        uv tool install ttok
        uv tool install strip-tags
      args:
        executable: /usr/bin/bash
      changed_when: true

    - name: "Create .config/io.datasette.llm/templates"
      ansible.builtin.file:
        path: "{{ home }}/.config/io.datasette.llm/templates"
        state: directory
        mode: "0755"

    - name: "Install llm cli templates"
      ansible.builtin.file:
        src: "{{ playbook_dir }}/llm/caveman.yaml"
        dest: "{{ home }}/.config/io.datasette.llm/templates/caveman.yaml"
        state: link
        access_time: preserve
        modification_time: preserve

    - name: "Install llm cli default models"
      ansible.builtin.file:
        src: "{{ playbook_dir }}/llm/{{ item }}"
        dest: "{{ home }}/.config/io.datasette.llm/{{ item }}"
        state: link
        access_time: preserve
        modification_time: preserve
      loop:
        - default_embedding_model.txt
        - default_model.txt

    - name: "Install latest Erlang using ASDF"
      ansible.builtin.shell: |
        . ~/.bashrc
        asdf plugin add erlang
        asdf install erlang latest
        asdf set --home erlang latest
      args:
        executable: /usr/bin/bash
        creates: "{{ home }}/.asdf/shims/erl"

    - name: "Clone rebar3"
      ansible.builtin.git:
        repo: https://github.com/erlang/rebar3
        dest: "{{ home }}/rebar3"
        version: main
        update: false

    - name: "Build rebar3"
      ansible.builtin.shell: . ~/.bashrc && cd {{ home }}/rebar3 && ./bootstrap
      args:
        executable: /usr/bin/bash
        creates: "{{ home }}/rebar3/_build/prod/bin/rebar3"

    - name: "Install rebar3"
      become: true
      ansible.builtin.shell: . ~/.bashrc && cp -f {{ home }}/rebar3/rebar3 /usr/local/bin
      args:
        executable: /usr/bin/bash
        creates: /usr/local/bin/rebar3

    - name: "Install latest Elixir using ASDF"
      ansible.builtin.shell: |
        . ~/.bashrc
        asdf plugin add elixir
        asdf install elixir latest
        asdf set --home elixir latest
      args:
        executable: /usr/bin/bash
        creates: "{{ home }}/.asdf/shims/iex"

    - name: "Install latest Rust using ASDF"
      ansible.builtin.shell: |
        . ~/.bashrc
        asdf plugin add rust
        asdf install rust latest
        asdf set --home rust latest
      args:
        executable: /usr/bin/bash
        creates: "{{ home }}/.asdf/shims/rustc"

    - name: "[Rust] Install Zoxide for easy searching"
      community.general.cargo:
        name: zoxide
        state: present
        locked: true

    - name: "[Rust] Install fd as a find replacement"
      community.general.cargo:
        name: fd-find
        state: present
        locked: true

    # JSON manipulation tool
    - name: Install jq
      become: true
      ansible.builtin.apt:
        pkg:
          - jq

    # Convert any standard Linux utilit/tool to JSON
    - name: "Check if jc is already installed"
      ansible.builtin.stat:
        path: "{{ bin_dir }}/jc"
      register: jc_binary_stat

    - name: "Install jc"
      ansible.builtin.unarchive:
        src: https://github.com/kellyjonbrazil/jc/releases/download/v1.25.6/jc-1.25.6-linux-x86_64.tar.gz
        dest: "{{ bin_dir }}"
        remote_src: true
      when: not jc_binary_stat.stat.exists
    ###

    # XML manipulation tool
    - name: Install xmlstarlet
      become: true
      ansible.builtin.apt:
        pkg:
          - xmlstarlet

    # YAML, XML manipulation tool
    - name: Install yq
      ansible.builtin.get_url:
        url: https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
        dest: "{{ bin_dir }}/yq"
        mode: '0755'

    # Database manipulation tool
    - name: Add sq GPG key
      become: true
      ansible.builtin.apt_key:
        url: https://apt.fury.io/neilotoole/gpg.key
        state: present

    - name: Add sq repository
      become: true
      ansible.builtin.apt_repository:
        repo: "deb https://apt.fury.io/neilotoole/ * *"
        state: present

    - name: Install sq
      become: true
      ansible.builtin.apt:
        name: sq
        state: present
        update_cache: true

    - name: "[Rust] Install difftastic, syntax aware diff tool"
      community.general.cargo:
        name: difftastic
        state: present
        locked: true

    - name: "Set difftastic as the default diff tool"
      community.general.git_config:
        name: diff.external
        scope: global
        value: "difft --display inline"

    - name: "[Rust] Install tmux-snaglord, easy copy stuff in tmux"
      community.general.cargo:
        name: tmux-snaglord
        state: present
        locked: true

    - name: "Ensure tmux-snaglord config directory exists"
      ansible.builtin.file:
        path: "{{ home }}/.config/tmux-snaglord"
        state: directory
        mode: '0755'

    - name: "Softlink tmux-snaglord configuration into home"
      ansible.builtin.file:
        src: "{{ playbook_dir }}/tmux-snaglord/config.toml"
        dest: "{{ home }}/.config/tmux-snaglord/config.toml"
        state: link
        access_time: preserve
        modification_time: preserve

    - name: "Install latest Go using ASDF"
      ansible.builtin.shell: |
        . ~/.bashrc
        asdf plugin add golang
        asdf install golang latest
        asdf set --home golang latest
      args:
        executable: /usr/bin/bash
        creates: "{{ home }}/.asdf/shims/go"

    - name: "[Go] Install pup, it can parse HTML and produce JSON"
      ansible.builtin.shell: |
        . ~/.bashrc
        go install github.com/ericchiang/pup@latest
        asdf reshim golang
      args:
        executable: /usr/bin/bash
        creates: "{{ home }}/.asdf/shims/pup"

    - name: "[Rust] Install ast-grep, grep on syntax pattern (using tree-sitter)"
      community.general.cargo:
        name: ast-grep
        state: present
        locked: true

    - name: "[Rust] Install tree-sitter-cli, used by Neovim"
      community.general.cargo:
        name: tree-sitter-cli
        state: present
        locked: true

    - name: "Install dependencies for jless"
      become: true
      ansible.builtin.apt:
        pkg:
          - libxcb-render0-dev
          - libxcb-shape0-dev
          - libxcb-xfixes0-dev

    - name: "[Rust] Install jless, a special kind of less for JSON"
      community.general.cargo:
        name: jless
        state: present
        locked: true

    - name: "Install latest NodeJS using ASDF"
      ansible.builtin.shell: |
        . ~/.bashrc
        asdf plugin add nodejs
        asdf install nodejs latest
        asdf set --home nodejs latest
      args:
        executable: /usr/bin/bash
        creates: "{{ home }}/.asdf/shims/node"

    - name: "Install Just for command files (https://github.com/casey/just)"
      ansible.builtin.shell: |
        . ~/.bashrc
        asdf plugin add just
        asdf install just latest
        asdf set --home just latest
      args:
        executable: /usr/bin/bash
        creates: "{{ home }}/.asdf/shims/just"

    - name: "Install Neovim dependencies"
      become: true
      ansible.builtin.apt:
        pkg:
          - luarocks
          - ninja-build
          - cmake
          - gettext
          - unzip
          - curl
          - build-essential
          # Neovim python plugins
          - black
          # - python3-debugpy
          - flake8
          - isort
          - mypy
          - pylint

    - name: "Clone Neovim"
      ansible.builtin.git:
        repo: https://github.com/neovim/neovim.git
        dest: "{{ home }}/nvim"
        version: master
        force: true
      when: install_neovim | bool

    - name: "Build Neovim"
      community.general.make:
        chdir: "{{ home }}/nvim"
        params:
          CMAKE_BUILD_TYPE: RelWithDebInfo
      changed_when: false
      when: install_neovim | bool

    - name: "Install Neovim"
      become: true
      community.general.make:
        chdir: "{{ home }}/nvim"
        target: install
      changed_when: false
      when: install_neovim | bool

    - name: "Softlink the Neovim configuration into home"
      ansible.builtin.file:
        src: "{{ playbook_dir }}/nvim"
        dest: "{{ home }}/.config/nvim"
        state: link
        access_time: preserve
        modification_time: preserve

    - name: "Install neovim pip package (for communicating with Python)"
      ansible.builtin.pip:
        name: neovim
        state: present
        # Dynamically apply the flag only on 24.04+
        extra_args: "{{ '--break-system-packages' if ansible_distribution_version is version('24.04', '>=') else '' }}"

    - name: "Install fzf using asdf to get latest version"
      ansible.builtin.shell: |
        . ~/.bashrc
        asdf plugin add fzf https://github.com/kompiro/asdf-fzf.git
        asdf install fzf latest
        asdf set --home fzf latest
        asdf reshim fzf
      args:
        executable: /usr/bin/bash
        creates: "{{ home }}/.asdf/shims/fzf"

    - name: "Install ripgrep and tmux"
      become: true
      ansible.builtin.apt:
        pkg:
          - ripgrep
          - tmux

    - name: "Install bat for preview"
      become: true
      ansible.builtin.apt:
        pkg: bat

    - name: "Symlink batcat -> bat"
      become: true
      ansible.builtin.file:
        src: /usr/bin/batcat
        dest: /usr/bin/bat
        state: link
        access_time: preserve
        modification_time: preserve

    # C-p C-t to pick any file from Zoxide into cursor position
    - name: "Install tmux-file-picker utility"
      ansible.builtin.get_url:
        url: https://raw.githubusercontent.com/raine/tmux-file-picker/main/tmux-file-picker
        dest: "{{ home }}/bin/tmux-file-picker"
        mode: '0755'

    - name: "Softlink tmux configuration into home"
      ansible.builtin.file:
        src: "{{ playbook_dir }}/.tmux.conf"
        dest: "{{ home }}/.tmux.conf"
        state: link
        access_time: preserve
        modification_time: preserve

    - name: "Clone tmux plugin manager"
      ansible.builtin.git:
        repo: https://github.com/tmux-plugins/tpm
        dest: "{{ home }}/.tmux/plugins/tpm"
        version: master
        update: false

    - name: "Install shellcheck for bash linting"
      become: true
      ansible.builtin.apt:
        pkg: shellcheck

    - name: "Install latest Lua using ASDF"
      ansible.builtin.shell: |
        . ~/.bashrc
        asdf plugin add lua https://github.com/Stratus3D/asdf-lua.git
        asdf install lua latest
        asdf set --home lua latest
      args:
        executable: /usr/bin/bash
        creates: "{{ home }}/.asdf/shims/lua"

    - name: "Install moreutils which includes 'vipe', it can be used to edit pipelines"
      become: true
      ansible.builtin.apt:
        pkg:
          - moreutils
